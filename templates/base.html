<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Arquivo Digital AdB{% endblock %}</title>
    
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/fadb.svg') }}">

    <style>
        @font-face {
            font-family: 'DINBlack';
            src: url("{{ url_for('static', filename='fonts/DINBlack.otf') }}") format('opentype');
            font-weight: 900;
        }
        @font-face {
            font-family: 'DINMedium';
            src: url("{{ url_for('static', filename='fonts/DINMedium.ttf') }}") format('truetype');
        }

        body {
            margin: 0;
            background-color: #374150;
            color: white;
            font-family: 'DINMedium', Arial, sans-serif;
        }

        /* MENU SUPERIOR: Padding de 40px para alinhar com o logo */
        .nav-topo {
            background-color: #2c3440;
            padding: 15px 40px; 
            display: flex;
            align-items: center;
            gap: 30px;
            border-bottom: 2px solid white;
        }

        .nav-topo a {
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-family: 'DINBlack';
            font-size: 14px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-topo a:hover { color: #027cb7; }

        .logo-nav { 
            height: 30px; 
            display: block;
        }

        /* BANNER */
        .banner-topo {
            width: 100%;
            height: 250px;
            background-image: url("{{ url_for('static', filename='images/banner-adb.png') }}");
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid white;
        }

        /* Espaço para o conteúdo das outras páginas */
        .conteudo-principal { 
            min-height: calc(100vh - 320px); 
            background-color: #f4f4f4; 
            color: #374150;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

    <nav class="nav-topo">
        <img src="{{ url_for('static', filename='images/adb.svg') }}" class="logo-nav" alt="AdB">
        <a href="/">Início</a>
        <a href="/linhas">Linhas</a>
        <a href="/historia">História</a>
    </nav>

    <header class="banner-topo"></header>

    <div class="conteudo-principal">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
