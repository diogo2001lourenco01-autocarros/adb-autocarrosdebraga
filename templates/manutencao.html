{% extends "base.html" %}

{% block content %}
<style>
    /* Contentor Principal */
    .pagina-manutencao {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 75vh;
        text-align: center;
        background-color: #f4f4f4;
        padding: 0 50px;
    }

    /* Badge de Status AdB */
    .status-tag {
        background-color: #e30613; /* Vermelho AdB */
        color: white;
        font-family: 'DINBlack', sans-serif;
        font-size: 10px;
        padding: 6px 15px;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 30px;
    }

    /* Tipografia das Curiosidades */
    .intro-txt {
        font-family: 'DINMedium', sans-serif;
        font-size: 19px;
        color: #374150;
        margin-bottom: 12px;
    }

    .historia-txt {
        font-family: 'DINBlack', sans-serif;
        font-size: 34px;
        color: #027cb7; /* Azul AdB */
        max-width: 850px;
        line-height: 1.2;
        margin-bottom: 50px;
    }

    /* Secção Siga-nos */
    .footer-social {
        display: flex;
        align-items: center;
        gap: 25px;
        margin-top: 20px;
        padding-top: 30px;
        border-top: 1px solid #ddd;
    }

    .siga-nos-label {
        font-family: 'DINBlack', sans-serif;
        font-size: 13px;
        color: #374150;
        text-transform: uppercase;
    }

    .social-btn {
        display: flex;
        align-items: center;
        text-decoration: none;
        color: #027cb7;
        font-family: 'DINMedium', sans-serif;
        font-size: 14px;
        transition: color 0.2s;
    }

    .social-btn:hover {
        color: #374150;
    }

    .social-icon {
        width: 18px;
        height: 18px;
        margin-right: 8px;
        fill: currentColor;
    }

    .refresh-msg {
        margin-top: 40px;
        font-family: 'DINMedium', sans-serif;
        font-size: 10px;
        color: #bbb;
        text-transform: uppercase;
    }
</style>

<div class="pagina-manutencao">
    <div class="status-tag">Site em Manutenção</div>

    <div class="intro-txt">Em breve, vai ver neste site que...</div>
    <div class="historia-txt">{{ curiosidade }}</div>

    <div class="footer-social">
        <span class="siga-nos-label">Siga-nos</span>
        
        <a href="https://facebook.com/autocarrosdebraga" target="_blank" class="social-btn">
            <svg class="social-icon" viewBox="0 0 24 24"><path d="M9 8h-3v4h3v12h5v-12h3.642l.358-4h-4v-1.667c0-.955.192-1.333 1.115-1.333h2.885v-5h-3.808c-3.596 0-5.192 1.583-5.192 4.615v3.385z"/></svg>
            Facebook
        </a>

        <a href="https://linkedin.com/company/autocarrosdebraga" target="_blank" class="social-btn">
            <svg class="social-icon" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
            LinkedIn
        </a>
    </div>

    <div class="refresh-msg">Faz refresh para outra curiosidade AdB 🔄</div>
</div>
{% endblock %}
