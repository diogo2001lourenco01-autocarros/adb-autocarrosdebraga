<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arquivo Digital AdB - Em Construção</title>
    
    <style>
        @font-face {
            font-family: 'DINBlack';
            src: url("{{ url_for('static', filename='fonts/DINBlack.woff2') }}") format('woff2');
            font-weight: 900;
            font-style: normal;
        }

        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Cor do fundo solicitada: #374150 */
            background-color: #374150;
            /* Cor das letras padrão: Branca */
            color: white;
            /* Fonte solicitada: DINBLACK */
            font-family: 'DINBlack', Arial, sans-serif;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 600px; /* Largura máxima para não esticar muito em ecrãs grandes */
            padding: 20px;
        }

        .logo {
            /* Ajusta o tamanho do teu logotipo conforme necessário */
            width: 250px; 
            height: auto;
            margin-bottom: 25px; /* Espaço entre o logo e o texto */
        }

        .texto-construcao {
            font-size: 28px;
            text-transform: uppercase; /* Para ficar mais "DIN" */
            letter-spacing: 2px; /* Espaçamento entre letras */
            margin-bottom: 0; /* Remove a margem inferior para a linha ficar colada */
        }

        /* A LINHA BRANCA SEPARADORA SOLICITADA */
        .linha-separadora {
            width: 100px; /* Largura da linha */
            height: 3px; /* Espessura da linha */
            background-color: white;
            margin: 15px 0 35px 0; /* Margem: Cima, Direita, Baixo, Esquerda */
            border-radius: 2px; /* Cantos ligeiramente arredondados */
        }

        /* SECÇÃO DAS REDES SOCIAIS */
        .social-seccao {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .texto-siga {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px; /* Espaço entre o texto e os ícones */
            color: white; /* Cor branca solicitada */
        }

        .icones-container {
            display: flex;
            justify-content: center;
            gap: 25px; /* Espaço entre os ícones */
        }

        .social-link {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50px; /* Tamanho do círculo */
            height: 50px;
            border-radius: 50%; /* Torna o fundo circular */
            text-decoration: none;
            transition: transform 0.3s ease, opacity 0.3s ease; /* Efeito suave */
        }

        .social-link:hover {
            transform: scale(1.1); /* Aumenta ligeiramente ao passar o rato */
            opacity: 0.9; /* Fica ligeiramente transparente */
        }

        /* Cores oficiais das marcas */
        .facebook {
            background-color: #1877F2; /* Azul oficial do Facebook */
        }

        .instagram {
            background-color: #E4405F; /* Rosa/Vermelho oficial do Instagram */
        }

        /* O ícone SVG dentro do círculo */
        .social-link svg {
            width: 26px;
            height: 26px;
            fill: white; /* Cor do ícone interna */
        }

    </style>
</head>
<body>
    <div class="container">
        <img src="{{ url_for('static', filename='images/adb.svg') }}" alt="Logotipo AdB" class="logo">
        
        <div class="texto-construcao">Site em construção</div>

        <div class="linha-separadora"></div>

        <div class="social-seccao">
            <div class="texto-siga">Siga-nos</div>

            <div class="icones-container">
                <a href="https://www.facebook.com/AutocarrosDeBraga" target="_blank" class="social-link facebook" title="Siga-nos no Facebook">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 512"><path d="M80 299.3V512H196V299.3h86.5l18-97.8H196V166.9c0-51.7 20.3-71.5 72.7-71.5c16.3 0 29.4 .4 37 1.2V7.9C291.4 4 256.4 0 236.2 0C129.3 0 80 50.5 80 159.4v42.1H0v97.8H80z"/></svg>
                </a>

                <a href="https://www.instagram.com/autocarrosdebragaadb/" target="_blank" class="social-link instagram" title="Siga-nos no Instagram">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M224.1 141c-63.6 0-114.9 51.3-114.9 114.9s51.3 114.9 114.9 114.9S339 319.5 339 255.9 287.7 141 224.1 141zm0 189.6c-41.1 0-74.7-33.5-74.7-74.7s33.5-74.7 74.7-74.7 74.7 33.5 74.7 74.7-33.6 74.7-74.7 74.7zm146.4-194.3c0 14.9-12 26.8-26.8 26.8-14.9 0-26.8-12-26.8-26.8s12-26.8 26.8-26.8 26.8 12 26.8 26.8zm76.1 27.2c-1.7-35.9-9.9-67.7-36.2-93.9-26.2-26.2-58-34.4-93.9-36.2-37-2.1-147.9-2.1-184.9 0-35.8 1.7-67.6 9.9-93.9 36.1s-34.4 58-36.2 93.9c-2.1 37-2.1 147.9 0 184.9 1.7 35.9 9.9 67.7 36.2 93.9s58 34.4 93.9 36.2c37 2.1 147.9 2.1 184.9 0 35.9-1.7 67.7-9.9 93.9-36.2 26.2-26.2 34.4-58 36.2-93.9 2.1-37 2.1-147.8 0-184.8zM398.8 388c-7.8 19.6-22.9 34.7-42.6 42.6-29.5 11.7-99.5 9-132.1 9s-102.7 2.6-132.1-9c-19.6-7.8-34.7-22.9-42.6-42.6-11.7-29.5-9-99.5-9-132.1s-2.6-102.7 9-132.1c7.8-19.6 22.9-34.7 42.6-42.6 29.5-11.7 99.5-9 132.1-9s102.7-2.6 132.1 9c19.6 7.8 34.7 22.9 42.6 42.6 11.7 29.5 9 99.5 9 132.1s2.7 102.7-9 132.1z"/></svg>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
