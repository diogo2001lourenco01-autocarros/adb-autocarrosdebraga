<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdB - Manutenção</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #374150; 
            color: white;
            font-family: 'Arial', sans-serif; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* LOGÓTIPO CENTRADO */
        .logo-adb {
            width: 180px; 
            margin-bottom: 50px;
        }

        /* BLOCO DE TEXTO */
        .intro-txt {
            font-family: 'DINMedium', sans-serif;
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .historia-txt {
            font-family: 'DINBlack', sans-serif;
            font-size: 32px;
            color: #027cb7; 
            max-width: 800px;
            line-height: 1.3;
            margin-bottom: 60px;
            padding: 0 20px;
        }

        /* REDES SOCIAIS: FACEBOOK E INSTAGRAM */
        .social-container {
            display: flex;
            align-items: center;
            gap: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 30px;
        }

        .siga-nos {
            font-family: 'DINBlack', sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .social-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            font-family: 'DINMedium', sans-serif;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        .social-link:hover {
            opacity: 0.7;
        }

        .icon-svg {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            fill: white;
        }

        /* MENSAGEM FINAL */
        .refresh-footer {
            margin-top: 50px;
            font-family: 'DINMedium', sans-serif;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

    <img src="{{ url_for('static', filename='images/logo_adb_branco.png') }}" alt="Autocarros de Braga" class="logo-adb">

    <div class="intro-txt">Em breve, vai ver neste site que...</div>
    <div class="historia-txt">{{ curiosidade }}</div>

    <div class="social-container">
        <span class="siga-nos">Siga-nos</span>
        
        <a href="https://www.facebook.com/AutocarrosDeBraga" target="_blank" class="social-link">

            Facebook
