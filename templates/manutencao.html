<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção - AdB</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            font-family: 'Arial', sans-serif; /* Podes trocar pelas DIN que instalaste */
            color: #374150;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
        }
        .logo-placeholder {
            font-size: 24px;
            font-weight: bold;
            color: #e30613;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .intro-text {
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: normal;
        }
        .historia-text {
            font-size: 20px;
            font-weight: bold; /* DIN BLACK style */
            color: #027cb7;
            min-height: 50px;
        }
        .footer-note {
            margin-top: 50px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-placeholder">Autocarros de Braga</div>
        
        <p class="intro-text">Em breve, vai ver neste site que...</p>
        <p class="historia-text">{{ curiosidade }}</p>

        <div class="footer-note">
            Estamos a atualizar os sistemas para o servir melhor.<br>
            Tente fazer <b>refresh</b> para ler outra curiosidade.
        </div>
    </div>

</body>
</html>
